<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>報表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { coffee: { 50:'#fdf8f0',100:'#faebd7',200:'#f5d5a8',300:'#edb96d',400:'#e09a3e',500:'#c97d22',600:'#a8631a',700:'#864e16',800:'#6b3e13',900:'#573310' } } } }
    }
  </script>
</head>
<body class="bg-coffee-50 min-h-screen pb-20">

  <header class="bg-coffee-800 text-white px-4 py-4 sticky top-0 z-10 shadow">
    <h1 class="text-xl font-bold">報表</h1>
  </header>

  <!-- 分頁切換 -->
  <div class="bg-white border-b border-coffee-100 px-4 pt-3 pb-0 sticky top-14 z-10">
    <div class="flex gap-0 border-b border-coffee-200">
      <button onclick="switchTab('weekly')" id="tab-weekly" class="tab-btn px-4 py-2.5 text-sm font-medium border-b-2 -mb-px border-coffee-700 text-coffee-800">週報</button>
      <button onclick="switchTab('monthly')" id="tab-monthly" class="tab-btn px-4 py-2.5 text-sm font-medium border-b-2 -mb-px border-transparent text-gray-500">月報</button>
      <button onclick="switchTab('quarterly')" id="tab-quarterly" class="tab-btn px-4 py-2.5 text-sm font-medium border-b-2 -mb-px border-transparent text-gray-500">季報</button>
    </div>
  </div>

  <main class="px-3 py-5 max-w-2xl mx-auto">

    <!-- 週報 -->
    <div id="panel-weekly">
      <div class="flex items-center justify-between mb-4 gap-2">
        <button onclick="weekOffset++;loadWeekly()" class="p-2 rounded-xl bg-white shadow-sm text-coffee-700 font-bold text-lg">&#8249;</button>
        <span id="weekly-period" class="text-sm font-medium text-coffee-800"></span>
        <button onclick="weekOffset--;loadWeekly()" class="p-2 rounded-xl bg-white shadow-sm text-coffee-700 font-bold text-lg">&#8250;</button>
      </div>
      <div id="weekly-content"></div>
    </div>

    <!-- 月報 -->
    <div id="panel-monthly" class="hidden">
      <div class="flex items-center justify-between mb-4 gap-2">
        <button onclick="prevMonth()" class="p-2 rounded-xl bg-white shadow-sm text-coffee-700 font-bold text-lg">&#8249;</button>
        <span id="monthly-period" class="text-sm font-medium text-coffee-800"></span>
        <button onclick="nextMonth()" class="p-2 rounded-xl bg-white shadow-sm text-coffee-700 font-bold text-lg">&#8250;</button>
      </div>
      <div id="monthly-content"></div>
    </div>

    <!-- 季報 -->
    <div id="panel-quarterly" class="hidden">
      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1">
          <div class="text-xs text-gray-500 mb-1">從</div>
          <input type="month" id="q-start" onchange="loadQuarterly()"
            class="w-full border border-coffee-200 rounded-xl px-3 py-2 text-sm bg-white">
        </div>
        <div class="text-gray-400 text-lg mt-4">—</div>
        <div class="flex-1">
          <div class="text-xs text-gray-500 mb-1">到</div>
          <input type="month" id="q-end" onchange="loadQuarterly()"
            class="w-full border border-coffee-200 rounded-xl px-3 py-2 text-sm bg-white">
        </div>
      </div>
      <div id="quarterly-content"></div>
      <button onclick="syncSheets()" class="w-full mt-5 flex items-center justify-center gap-2 border-2 border-coffee-300 text-coffee-700 py-3 rounded-xl font-medium hover:bg-coffee-50 transition">
        <span>同步到 Google Sheets</span>
      </button>
    </div>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-coffee-200 flex justify-around py-1.5 z-40">
    <a href="/" class="flex flex-col items-center text-gray-400"><span class="text-xl">📋</span><span class="text-xs">今日</span></a>
    <a href="/static/new_order.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">➕</span><span class="text-xs">新增</span></a>
    <a href="/static/orders.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">📦</span><span class="text-xs">訂單</span></a>
    <a href="/static/customers.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">👥</span><span class="text-xs">客戶</span></a>
    <a href="/static/inventory.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">🏪</span><span class="text-xs">庫存</span></a>
    <a href="/static/reports.html" class="flex flex-col items-center text-coffee-700 font-medium"><span class="text-xl">📊</span><span class="text-xs">報表</span></a>
  </nav>

  <script>
    let currentTab = 'weekly';
    let weekOffset = 0;
    const today = new Date();
    let monthYear = today.getFullYear(), monthMonth = today.getMonth() + 1;

    function switchTab(tab) {
      currentTab = tab;
      ['weekly','monthly','quarterly'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
        const btn = document.getElementById(`tab-${t}`);
        btn.classList.toggle('border-coffee-700', t === tab);
        btn.classList.toggle('text-coffee-800', t === tab);
        btn.classList.toggle('border-transparent', t !== tab);
        btn.classList.toggle('text-gray-500', t !== tab);
      });
      if (tab==='weekly') loadWeekly();
      else if (tab==='monthly') loadMonthly();
      else { initQuarterly(); loadQuarterly(); }
    }

    function statsCard(label, value, sub='', accent=false) {
      return `<div class="${accent?'bg-coffee-800 text-white':'bg-white'} rounded-2xl p-4 shadow-sm">
        <div class="text-xs ${accent?'text-coffee-300':'text-gray-500'} mb-1">${label}</div>
        <div class="text-2xl font-bold">${value}</div>
        ${sub ? `<div class="text-xs mt-0.5 ${accent?'text-coffee-300':'text-gray-400'}">${sub}</div>` : ''}
      </div>`;
    }

    async function loadWeekly() {
      const res = await fetch(`/api/reports/weekly?week_offset=${weekOffset}`);
      const d = await res.json();
      document.getElementById('weekly-period').textContent = d.period;
      const dailyRows = d.daily_breakdown.map(day => `
        <div class="flex items-center justify-between text-sm py-2 border-b border-coffee-50 last:border-0">
          <span class="text-gray-500 w-16">週${day.day} ${day.date}</span>
          <span class="text-gray-400 text-xs w-10 text-center">${day.order_count}筆</span>
          <span class="font-medium text-coffee-800">$${day.revenue.toFixed(0)}</span>
        </div>
      `).join('');
      document.getElementById('weekly-content').innerHTML = `
        <div class="grid grid-cols-2 gap-3 mb-4">
          ${statsCard('營業額', '$'+d.revenue.toFixed(0))}
          ${statsCard('訂單數', d.order_count+'筆')}
          ${statsCard('進貨成本', '$'+d.purchase_cost.toFixed(0))}
          ${statsCard('淨利', '$'+d.net_profit.toFixed(0), '', true)}
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-4">
          <div class="text-sm font-semibold text-coffee-800 mb-1">每日明細</div>
          ${dailyRows}
        </div>
      `;
    }

    function prevMonth() {
      monthMonth--;
      if (monthMonth<1){monthMonth=12;monthYear--;}
      loadMonthly();
    }
    function nextMonth() {
      monthMonth++;
      if (monthMonth>12){monthMonth=1;monthYear++;}
      loadMonthly();
    }
    async function loadMonthly() {
      const res = await fetch(`/api/reports/monthly?year=${monthYear}&month=${monthMonth}`);
      const d = await res.json();
      document.getElementById('monthly-period').textContent = d.period;
      const weeklyRows = d.weekly_breakdown.map(w => `
        <div class="flex items-center justify-between text-sm py-2 border-b border-coffee-50 last:border-0">
          <span class="text-gray-500">${w.label}</span>
          <span class="text-gray-400 text-xs w-10 text-center">${w.order_count}筆</span>
          <span class="font-medium text-coffee-800">$${w.revenue.toFixed(0)}</span>
        </div>
      `).join('');
      document.getElementById('monthly-content').innerHTML = `
        <div class="grid grid-cols-2 gap-3 mb-4">
          ${statsCard('營業額', '$'+d.revenue.toFixed(0))}
          ${statsCard('訂單數', d.order_count+'筆')}
          ${statsCard('進貨成本', '$'+d.purchase_cost.toFixed(0))}
          ${statsCard('淨利', '$'+d.net_profit.toFixed(0), '', true)}
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-4">
          <div class="text-sm font-semibold text-coffee-800 mb-1">每週明細</div>
          ${weeklyRows}
        </div>
      `;
    }

    function initQuarterly() {
      const y = today.getFullYear();
      const m = String(today.getMonth() + 1).padStart(2, '0');
      if (!document.getElementById('q-start').value) {
        document.getElementById('q-start').value = `${y}-01`;
        document.getElementById('q-end').value = `${y}-${m}`;
      }
    }

    async function loadQuarterly() {
      const start = document.getElementById('q-start').value;
      const end = document.getElementById('q-end').value;
      if (!start || !end) return;
      const res = await fetch(`/api/reports/quarterly?start_ym=${start}&end_ym=${end}`);
      const d = await res.json();
      const breakdown = d.monthly_breakdown.map(m => `
        <div class="flex items-center justify-between text-sm py-2 border-b border-coffee-50 last:border-0">
          <span class="text-gray-600">${m.month}</span>
          <span class="text-coffee-800 font-medium">$${m.revenue.toFixed(0)}</span>
          <span class="text-gray-400 text-xs">淨利 $${m.net_profit.toFixed(0)}</span>
        </div>
      `).join('');
      document.getElementById('quarterly-content').innerHTML = `
        <div class="text-sm font-medium text-coffee-700 mb-3">${d.period}</div>
        <div class="grid grid-cols-2 gap-3 mb-4">
          ${statsCard('總營業額', '$'+d.revenue.toFixed(0))}
          ${statsCard('總訂單數', d.order_count+'筆')}
          ${statsCard('進貨成本', '$'+d.purchase_cost.toFixed(0))}
          ${statsCard('淨利', '$'+d.net_profit.toFixed(0), '', true)}
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
          ${statsCard('應匯老闆 (30%)', '$'+d.boss_payout.toFixed(0), '淨利×30%')}
          ${statsCard('自留 (70%)', '$'+d.self_payout.toFixed(0), '淨利×70%')}
          ${statsCard('總銷售克數', d.total_grams.toFixed(1)+'g')}
          ${statsCard('換算磅數', d.total_pounds.toFixed(3)+' lb')}
        </div>
        ${d.monthly_breakdown.length > 1 ? `
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-4">
          <div class="text-sm font-semibold text-coffee-800 mb-2">每月營收拆解</div>
          ${breakdown}
        </div>` : ''}
      `;
    }

    function syncSheets() {
      alert('Google Sheets 串接尚未設定，功能即將推出。');
    }

    loadWeekly();
  </script>
</body>
</html>
