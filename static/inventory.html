<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>庫存管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { coffee: { 50:'#fdf8f0',100:'#faebd7',200:'#f5d5a8',300:'#edb96d',400:'#e09a3e',500:'#c97d22',600:'#a8631a',700:'#864e16',800:'#6b3e13',900:'#573310' } } } }
    }
  </script>
</head>
<body class="bg-coffee-50 min-h-screen pb-20">

  <header class="bg-coffee-800 text-white px-4 py-4 sticky top-0 z-10 shadow">
    <h1 class="text-xl font-bold">庫存管理</h1>
  </header>

  <main class="px-3 py-4 max-w-2xl mx-auto space-y-5">

    <!-- 商品列表 -->
    <section class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 border-b border-coffee-100">
        <h2 class="font-semibold text-coffee-800">商品庫存</h2>
        <button onclick="openNewProduct()" class="bg-coffee-700 text-white text-sm px-3 py-1.5 rounded-lg">+ 新增商品</button>
      </div>
      <div id="products-list" class="divide-y divide-coffee-50"></div>
    </section>

    <!-- 登記進貨 -->
    <section class="bg-white rounded-2xl shadow-sm p-4">
      <h2 class="font-semibold text-coffee-800 mb-3">登記進貨</h2>
      <div class="space-y-3">
        <select id="purchase-product" class="w-full border border-coffee-200 rounded-xl px-3 py-2.5 text-sm">
          <option value="">選擇商品...</option>
        </select>
        <div>
          <label class="text-xs text-gray-500">進貨日期</label>
          <input type="date" id="purchase-date" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2 text-sm">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-gray-500">進貨克數</label>
            <input type="number" id="purchase-grams" placeholder="克數" min="1" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2 text-sm" oninput="calcCost()">
          </div>
          <div>
            <label class="text-xs text-gray-500">總進貨金額 ($)</label>
            <input type="number" id="purchase-total-amount" placeholder="總金額" min="0" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2 text-sm" oninput="calcCost()">
          </div>
        </div>
        <div class="text-sm text-coffee-700 font-medium" id="purchase-cost-display"></div>
        <input id="purchase-notes" placeholder="備註（選填）" class="w-full border border-coffee-200 rounded-xl px-3 py-2 text-sm">
        <button onclick="addPurchase()" class="w-full bg-coffee-700 text-white py-3 rounded-xl font-medium">確認進貨</button>
      </div>
    </section>

    <!-- 近期進貨記錄 -->
    <section class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <div class="px-4 py-3 border-b border-coffee-100">
        <h2 class="font-semibold text-coffee-800">近期進貨記錄</h2>
      </div>
      <div id="purchase-list" class="divide-y divide-coffee-50"></div>
    </section>
  </main>

  <!-- 進貨記錄編輯 Modal -->
  <div id="purchase-edit-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-end sm:items-center justify-center">
    <div class="bg-white w-full max-w-lg rounded-t-2xl sm:rounded-2xl p-5">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold text-coffee-900">編輯進貨記錄</h2>
        <button onclick="closePurchaseEdit()" class="text-gray-400 text-2xl leading-none">&times;</button>
      </div>
      <div class="space-y-3">
        <div>
          <label class="text-xs text-gray-500">進貨日期</label>
          <input type="date" id="pe-date" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2 text-sm">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-gray-500">進貨克數</label>
            <input type="number" id="pe-grams" min="1" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2 text-sm" oninput="calcPeEdit()">
          </div>
          <div>
            <label class="text-xs text-gray-500">總金額 ($)</label>
            <input type="number" id="pe-total" min="0" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2 text-sm" oninput="calcPeEdit()">
          </div>
        </div>
        <div class="text-sm text-coffee-700 font-medium" id="pe-cost-display"></div>
        <div>
          <label class="text-xs text-gray-500">備註</label>
          <input id="pe-notes" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2 text-sm">
        </div>
      </div>
      <button onclick="savePurchaseEdit()" class="w-full mt-5 bg-coffee-700 text-white py-3 rounded-xl font-medium">儲存</button>
    </div>
  </div>

  <!-- 新增/編輯商品 Modal -->
  <div id="product-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-end sm:items-center justify-center">
    <div class="bg-white w-full max-w-lg rounded-t-2xl sm:rounded-2xl p-5">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold text-coffee-900" id="product-modal-title">新增商品</h2>
        <button onclick="closeProductModal()" class="text-gray-400 text-2xl leading-none">&times;</button>
      </div>
      <div class="space-y-3">
        <div>
          <label class="text-sm text-gray-600">商品名稱 *</label>
          <input id="pm-name" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2.5">
        </div>
        <div>
          <label class="text-sm text-gray-600 mb-2 block">各規格售價（未設定的規格不會顯示）</label>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-xs text-gray-400">3g 售價 ($)</label>
              <input type="number" id="pm-p3" min="0" class="w-full mt-0.5 border border-coffee-200 rounded-xl px-3 py-2">
            </div>
            <div>
              <label class="text-xs text-gray-400">7g 售價 ($)</label>
              <input type="number" id="pm-p7" min="0" class="w-full mt-0.5 border border-coffee-200 rounded-xl px-3 py-2">
            </div>
            <div>
              <label class="text-xs text-gray-400">14g 售價 ($)</label>
              <input type="number" id="pm-p14" min="0" class="w-full mt-0.5 border border-coffee-200 rounded-xl px-3 py-2">
            </div>
            <div>
              <label class="text-xs text-gray-400">28g 售價 ($)</label>
              <input type="number" id="pm-p28" min="0" class="w-full mt-0.5 border border-coffee-200 rounded-xl px-3 py-2">
            </div>
          </div>
          <div class="border-t border-coffee-100 pt-2">
            <label class="text-xs text-gray-500 mb-1 block">自訂規格（選填）</label>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="text-xs text-gray-400">克數</label>
                <input type="number" id="pm-custom-g" min="0" class="w-full mt-0.5 border border-coffee-200 rounded-xl px-3 py-2">
              </div>
              <div>
                <label class="text-xs text-gray-400">售價 ($)</label>
                <input type="number" id="pm-custom-p" min="0" class="w-full mt-0.5 border border-coffee-200 rounded-xl px-3 py-2">
              </div>
            </div>
          </div>
        </div>
        <div class="flex gap-2 pt-1">
          <button onclick="submitProduct()" class="flex-1 bg-coffee-700 text-white py-3 rounded-xl font-medium">儲存</button>
          <button onclick="closeProductModal()" class="flex-1 border border-coffee-200 text-gray-500 py-3 rounded-xl">取消</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-coffee-200 flex justify-around py-1.5 z-40">
    <a href="/" class="flex flex-col items-center text-gray-400"><span class="text-xl">📋</span><span class="text-xs">今日</span></a>
    <a href="/static/new_order.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">➕</span><span class="text-xs">新增</span></a>
    <a href="/static/orders.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">📦</span><span class="text-xs">訂單</span></a>
    <a href="/static/customers.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">👥</span><span class="text-xs">客戶</span></a>
    <a href="/static/inventory.html" class="flex flex-col items-center text-coffee-700 font-medium"><span class="text-xl">🏪</span><span class="text-xs">庫存</span></a>
    <a href="/static/reports.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">📊</span><span class="text-xs">報表</span></a>
  </nav>

  <script>
    let editingProductId = null;
    let editingPurchaseId = null;
    let allProducts = [];
    let allPurchasesMap = {};

    function priceTag(label, val) {
      return val != null ? `<span class="text-xs bg-coffee-50 text-coffee-700 px-1.5 py-0.5 rounded">${label}/$${val}</span>` : '';
    }

    async function load() {
      const [prodRes, purchRes] = await Promise.all([
        fetch('/api/products/'),
        fetch('/api/inventory/purchases?limit=20'),
      ]);
      allProducts = await prodRes.json();
      const purchases = await purchRes.json();
      renderProducts(allProducts);
      renderPurchases(purchases);
      refreshProductSelect(allProducts.filter(p => p.is_active));
      if (!document.getElementById('purchase-date').value) {
        document.getElementById('purchase-date').value = new Date().toLocaleDateString('en-CA');
      }
    }

    function renderProducts(products) {
      const list = document.getElementById('products-list');
      if (!products.length) { list.innerHTML = '<div class="px-4 py-6 text-center text-gray-400 text-sm">尚無商品</div>'; return; }
      list.innerHTML = products.map(p => {
        const customLabel = p.price_custom_grams ? `${p.price_custom_grams}g` : null;
        const prices = [
          priceTag('3g', p.price_3g), priceTag('7g', p.price_7g),
          priceTag('14g', p.price_14g), priceTag('28g', p.price_28g),
          customLabel ? priceTag(customLabel, p.price_custom_price) : null,
        ].filter(Boolean).join(' ');
        return `
        <div class="px-4 py-3">
          <div class="flex items-start gap-3">
            <div class="flex-1 min-w-0">
              <div class="font-medium text-coffee-900">${p.name}</div>
              <div class="flex flex-wrap gap-1 mt-1">${prices || '<span class="text-xs text-gray-400">未設定售價</span>'}</div>
              <div class="text-xs text-gray-400 mt-1">庫存 ${p.stock_grams.toFixed(0)}g</div>
            </div>
            <div class="flex gap-1.5 shrink-0 mt-0.5">
              <button onclick="openEditProduct(${p.id})" class="text-xs px-2.5 py-1.5 bg-coffee-100 text-coffee-800 rounded-lg">編輯</button>
              <button onclick="deactivate(${p.id})" class="text-xs px-2.5 py-1.5 bg-red-50 text-red-600 rounded-lg">下架</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function renderPurchases(purchases) {
      allPurchasesMap = {};
      purchases.forEach(r => allPurchasesMap[r.id] = r);
      const list = document.getElementById('purchase-list');
      if (!purchases.length) { list.innerHTML = '<div class="px-4 py-6 text-center text-gray-400 text-sm">尚無進貨記錄</div>'; return; }
      list.innerHTML = purchases.map(r => `
        <div class="px-4 py-3">
          <div class="flex justify-between items-start">
            <div>
              <div class="font-medium text-sm text-coffee-900">${r.product?.name || '?'}</div>
              <div class="text-xs text-gray-500">${r.quantity_grams}g × $${r.cost_per_gram.toFixed(4)}/g${r.notes ? '　' + r.notes : ''}</div>
            </div>
            <div class="text-right shrink-0">
              <div class="font-semibold text-sm text-coffee-800">$${r.total_cost.toFixed(0)}</div>
              <div class="text-xs text-gray-400">${new Date(r.purchased_at).toLocaleDateString('zh-TW')}</div>
              <button onclick="openPurchaseEdit(${r.id})" class="text-xs text-coffee-600 underline mt-0.5">編輯</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openPurchaseEdit(id) {
      const r = allPurchasesMap[id];
      if (!r) return;
      editingPurchaseId = id;
      const d = new Date(r.purchased_at);
      document.getElementById('pe-date').value = d.toLocaleDateString('en-CA');
      document.getElementById('pe-grams').value = r.quantity_grams;
      document.getElementById('pe-total').value = r.total_cost;
      document.getElementById('pe-notes').value = r.notes || '';
      calcPeEdit();
      document.getElementById('purchase-edit-modal').classList.remove('hidden');
    }

    function closePurchaseEdit() {
      document.getElementById('purchase-edit-modal').classList.add('hidden');
      editingPurchaseId = null;
    }

    function calcPeEdit() {
      const g = parseFloat(document.getElementById('pe-grams').value) || 0;
      const total = parseFloat(document.getElementById('pe-total').value) || 0;
      document.getElementById('pe-cost-display').textContent = g > 0 && total > 0 ? `每克成本：$${(total / g).toFixed(4)}` : '';
    }

    async function savePurchaseEdit() {
      const grams = parseFloat(document.getElementById('pe-grams').value);
      const total = parseFloat(document.getElementById('pe-total').value);
      const purchaseDate = document.getElementById('pe-date').value;
      const notes = document.getElementById('pe-notes').value.trim();
      if (!grams || !total) { alert('請填寫克數和金額'); return; }
      await fetch(`/api/inventory/purchases/${editingPurchaseId}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          quantity_grams: grams,
          total_cost: total,
          purchased_at: purchaseDate || null,
          notes: notes || null,
        }),
      });
      closePurchaseEdit();
      load();
    }

    function refreshProductSelect(products) {
      const sel = document.getElementById('purchase-product');
      const val = sel.value;
      sel.innerHTML = '<option value="">選擇商品...</option>';
      products.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
      if (val) sel.value = val;
    }

    function openNewProduct() {
      editingProductId = null;
      document.getElementById('product-modal-title').textContent = '新增商品';
      ['pm-name','pm-p3','pm-p7','pm-p14','pm-p28','pm-custom-g','pm-custom-p'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('product-modal').classList.remove('hidden');
    }

    function openEditProduct(id) {
      const p = allProducts.find(x => x.id === id);
      if (!p) return;
      editingProductId = id;
      document.getElementById('product-modal-title').textContent = '編輯商品';
      document.getElementById('pm-name').value = p.name;
      document.getElementById('pm-p3').value = p.price_3g ?? '';
      document.getElementById('pm-p7').value = p.price_7g ?? '';
      document.getElementById('pm-p14').value = p.price_14g ?? '';
      document.getElementById('pm-p28').value = p.price_28g ?? '';
      document.getElementById('pm-custom-g').value = p.price_custom_grams ?? '';
      document.getElementById('pm-custom-p').value = p.price_custom_price ?? '';
      document.getElementById('product-modal').classList.remove('hidden');
    }

    function closeProductModal() {
      document.getElementById('product-modal').classList.add('hidden');
    }

    function parsePrice(id) {
      const v = document.getElementById(id).value;
      return v === '' ? null : parseFloat(v);
    }

    async function submitProduct() {
      const name = document.getElementById('pm-name').value.trim();
      if (!name) { alert('請填寫名稱'); return; }
      const body = {
        name,
        price_3g: parsePrice('pm-p3'),
        price_7g: parsePrice('pm-p7'),
        price_14g: parsePrice('pm-p14'),
        price_28g: parsePrice('pm-p28'),
        price_custom_grams: parsePrice('pm-custom-g'),
        price_custom_price: parsePrice('pm-custom-p'),
      };
      if (editingProductId) {
        await fetch(`/api/products/${editingProductId}`, {
          method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body),
        });
      } else {
        await fetch('/api/products/', {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body),
        });
      }
      closeProductModal();
      load();
    }

    async function deactivate(id) {
      if (!confirm('確定要下架此商品？下架後不再顯示，歷史訂單資料不受影響。')) return;
      await fetch(`/api/products/${id}`, { method: 'DELETE' });
      load();
    }

    function calcCost() {
      const g = parseFloat(document.getElementById('purchase-grams').value) || 0;
      const total = parseFloat(document.getElementById('purchase-total-amount').value) || 0;
      const display = document.getElementById('purchase-cost-display');
      if (g > 0 && total > 0) {
        display.textContent = `每克成本：$${(total / g).toFixed(4)}`;
      } else {
        display.textContent = '';
      }
    }

    async function addPurchase() {
      const productId = parseInt(document.getElementById('purchase-product').value);
      const grams = parseFloat(document.getElementById('purchase-grams').value);
      const totalAmount = parseFloat(document.getElementById('purchase-total-amount').value);
      const notes = document.getElementById('purchase-notes').value.trim();
      const purchaseDate = document.getElementById('purchase-date').value;
      if (!productId || !grams || isNaN(totalAmount) || totalAmount <= 0) {
        alert('請填寫完整進貨資訊');
        return;
      }
      const costPerGram = totalAmount / grams;
      await fetch('/api/inventory/purchases', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ product_id: productId, quantity_grams: grams, cost_per_gram: costPerGram, purchased_at: purchaseDate || null, notes: notes || null }),
      });
      document.getElementById('purchase-grams').value = '';
      document.getElementById('purchase-total-amount').value = '';
      document.getElementById('purchase-notes').value = '';
      document.getElementById('purchase-cost-display').textContent = '';
      load();
    }

    document.getElementById('product-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeProductModal();
    });
    document.getElementById('purchase-edit-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closePurchaseEdit();
    });

    load();
  </script>
</body>
</html>
