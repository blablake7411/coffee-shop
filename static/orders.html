<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>訂單管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        coffee: { 50:'#fafaf9',100:'#f5f5f4',200:'#e7e5e4',300:'#d6d3d1',400:'#a8a29e',500:'#78716c',600:'#57534e',700:'#44403c',800:'#292524',900:'#1c1917' },
        brand: '#D85A30'
      }}}
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-20">
    <div id="month-header" class="px-3 py-2 flex items-center gap-2">
      <button onclick="prevMonth()" class="text-gray-600 px-2 py-1 text-xl shrink-0">&#8249;</button>
      <div class="flex-1 flex justify-center">
        <input type="month" id="month-picker"
          class="text-gray-900 text-base font-bold text-center border-none outline-none cursor-pointer bg-transparent">
      </div>
      <button onclick="nextMonth()" class="text-gray-600 px-2 py-1 text-xl shrink-0">&#8250;</button>
      <button onclick="enterSearch()" class="text-gray-500 text-lg px-1 shrink-0">
        <i class="ti ti-search"></i>
      </button>
    </div>
    <div id="search-header" class="px-3 py-2 flex items-center gap-2 hidden">
      <input type="text" id="search-input" placeholder="搜尋客戶名稱..."
        class="flex-1 bg-gray-100 text-gray-900 placeholder-gray-400 rounded-xl px-3 py-2 text-sm outline-none"
        oninput="handleSearch()">
      <button onclick="exitSearch()" class="text-gray-500 text-sm shrink-0 px-1">取消</button>
    </div>
  </header>

  <!-- 月曆 -->
  <div id="calendar-section" class="bg-white border-b border-gray-200 pb-2 pt-3 px-2 sticky top-12 z-10">
    <div class="grid grid-cols-7 text-center mb-1">
      <div class="text-xs text-gray-400 font-medium py-1">一</div>
      <div class="text-xs text-gray-400 font-medium py-1">二</div>
      <div class="text-xs text-gray-400 font-medium py-1">三</div>
      <div class="text-xs text-gray-400 font-medium py-1">四</div>
      <div class="text-xs text-gray-400 font-medium py-1">五</div>
      <div class="text-xs text-gray-400 font-medium py-1">六</div>
      <div class="text-xs text-red-400 font-medium py-1">日</div>
    </div>
    <div id="calendar-grid" class="grid grid-cols-7 gap-0.5"></div>
  </div>

  <main class="px-3 py-4 max-w-2xl mx-auto">
    <div id="day-orders-section">
      <div id="selected-day-label" class="text-sm font-medium text-gray-700 mb-3 hidden"></div>
      <div id="orders-list" class="space-y-2"></div>
      <div id="empty-msg" class="text-center text-gray-300 py-10 hidden">
        <div class="text-sm">點擊日期查看訂單</div>
      </div>
    </div>
    <div id="search-results" class="hidden">
      <div class="flex gap-2 mb-3">
        <button onclick="toggleFilter('credit')" id="filter-credit"
          class="text-xs px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 transition">賒帳未還</button>
        <button onclick="toggleFilter('transfer')" id="filter-transfer"
          class="text-xs px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 transition">匯款</button>
      </div>
      <div id="search-count" class="text-xs text-gray-400 mb-2"></div>
      <div id="search-list" class="space-y-2"></div>
    </div>
  </main>

  <!-- 訂單編輯 Modal -->
  <div id="detail-modal" class="fixed inset-0 bg-black/50 z-50 hidden overflow-y-auto">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="bg-white w-full max-w-lg rounded-2xl p-5 my-4">
        <div class="flex items-center gap-2 mb-4">
          <div class="flex-1 min-w-0 relative">
            <div id="detail-name-display" class="flex items-center gap-1.5">
              <span class="text-lg font-bold text-gray-900 truncate" id="detail-customer-name"></span>
              <button type="button" onclick="toggleNameEdit()" class="text-gray-300 hover:text-brand shrink-0">
                <i class="ti ti-pencil text-sm"></i>
              </button>
            </div>
            <div id="detail-name-edit" class="hidden">
              <input type="text" id="detail-name-input"
                class="w-full border border-brand rounded-lg px-2 py-1.5 text-base font-bold focus:outline-none"
                oninput="onDetailNameInput()" autocomplete="off">
              <div id="detail-name-suggestions" class="absolute left-0 right-0 bg-white border border-gray-200 rounded-xl mt-1 shadow-lg z-30 hidden max-h-40 overflow-y-auto text-sm"></div>
            </div>
          </div>
          <button onclick="closeDetail()" class="text-gray-400 text-2xl leading-none shrink-0">&times;</button>
        </div>
        <div id="items-editor" class="space-y-1.5 mb-2"></div>
        <button type="button" onclick="addItemRow()" class="text-sm text-brand flex items-center gap-1 mt-2">
          <i class="ti ti-plus text-xs"></i> 新增品項
        </button>
        <div class="mt-2 mb-3 text-sm text-right text-gray-500">
          小計 <span id="items-subtotal-display" class="font-medium text-gray-800">$0</span>
        </div>
        <hr class="border-gray-100 mb-4">
        <div class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-sm font-medium text-gray-600">訂單日期</label>
              <input type="date" id="edit-date" class="w-full mt-1 border border-gray-200 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
              <label class="text-sm font-medium text-gray-600">狀態</label>
              <select id="edit-status" class="w-full mt-1 border border-gray-200 rounded-lg px-3 py-2">
                <option>待確認</option><option>處理中</option><option>已出貨</option><option>完成</option><option>退款</option>
              </select>
            </div>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-600">付款方式</label>
            <div class="flex gap-2 mt-1">
              <button id="pay-cash" onclick="setPayMethod('現金')"
                class="flex-1 py-2 rounded-lg text-sm font-medium border-2 transition">現金</button>
              <button id="pay-transfer" onclick="setPayMethod('匯款')"
                class="flex-1 py-2 rounded-lg text-sm font-medium border-2 transition">匯款</button>
            </div>
          </div>
          <div id="old-discount-banner" class="hidden bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-xs text-amber-700"></div>
          <div id="old-shipping-banner" class="hidden bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-xs text-blue-700"></div>
          <div>
            <label class="text-sm font-medium text-gray-600">實收金額（自動計算）</label>
            <input type="number" id="edit-final" class="w-full mt-1 border border-gray-200 rounded-lg px-3 py-2 bg-gray-50" min="0" readonly>
          </div>
          <div class="flex flex-wrap gap-4">
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" id="edit-credit" class="accent-brand w-4 h-4"> 賒帳
            </label>
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" id="edit-credit-paid" class="accent-green-600 w-4 h-4"> 已還清
            </label>
          </div>
          <div>
            <label class="text-sm font-medium text-gray-600">備註</label>
            <textarea id="edit-notes" rows="2" class="w-full mt-1 border border-gray-200 rounded-lg px-3 py-2 text-sm"></textarea>
          </div>
          <button onclick="saveOrder()" class="w-full bg-brand text-white py-3 rounded-xl font-medium">儲存</button>
          <button onclick="deleteOrder()" class="w-full border border-red-200 text-red-500 py-3 rounded-xl font-medium">刪除訂單</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-1.5 z-40">
    <a href="/" class="flex flex-col items-center text-gray-400"><i class="ti ti-calendar-event text-xl"></i><span class="text-xs">今日</span></a>
    <a href="/static/new_order.html" class="flex flex-col items-center text-gray-400"><i class="ti ti-plus text-xl"></i><span class="text-xs">新增</span></a>
    <a href="/static/orders.html" class="flex flex-col items-center text-brand font-medium"><i class="ti ti-package text-xl"></i><span class="text-xs">訂單</span></a>
    <a href="/static/customers.html" class="flex flex-col items-center text-gray-400"><i class="ti ti-users text-xl"></i><span class="text-xs">客戶</span></a>
    <a href="/static/inventory.html" class="flex flex-col items-center text-gray-400"><i class="ti ti-box text-xl"></i><span class="text-xs">庫存</span></a>
    <a href="/static/reports.html" class="flex flex-col items-center text-gray-400"><i class="ti ti-chart-bar text-xl"></i><span class="text-xs">報表</span></a>
  </nav>

  <script>
    const STATUS_COLORS = {
      '待確認':'bg-yellow-100 text-yellow-800','處理中':'bg-blue-100 text-blue-800',
      '已出貨':'bg-purple-100 text-purple-800','完成':'bg-green-100 text-green-800','退款':'bg-red-100 text-red-800',
    };

    const TZ = 'Australia/Sydney';
    let currentYear, currentMonth;
    let allOrders = [];
    let ordersByDate = {};
    let selectedDate = null;
    let currentOrder = null;
    let activeFilter = null;
    let products = [];
    let customers = [];
    let itemRowCount = 0;
    let selectedNewCustomerId = null;

    async function loadProducts() {
      const res = await fetch('/api/products/');
      products = await res.json();
    }

    async function ensureCustomers() {
      if (!customers.length) {
        const res = await fetch('/api/customers/');
        customers = await res.json();
      }
    }

    function toggleNameEdit() {
      const display = document.getElementById('detail-name-display');
      const edit = document.getElementById('detail-name-edit');
      const isEditing = !edit.classList.contains('hidden');
      display.classList.toggle('hidden', !isEditing);
      edit.classList.toggle('hidden', isEditing);
      if (!isEditing) {
        const input = document.getElementById('detail-name-input');
        input.value = currentOrder?.customer?.name || '';
        selectedNewCustomerId = null;
        ensureCustomers();
        input.focus();
      } else {
        document.getElementById('detail-name-suggestions').classList.add('hidden');
      }
    }

    async function onDetailNameInput() {
      selectedNewCustomerId = null;
      const q = document.getElementById('detail-name-input').value.trim().toLowerCase();
      const box = document.getElementById('detail-name-suggestions');
      if (!q) { box.classList.add('hidden'); return; }
      await ensureCustomers();
      const matches = customers.filter(c => c.name.toLowerCase().includes(q));
      if (!matches.length) { box.classList.add('hidden'); return; }
      box.innerHTML = matches.map(c =>
        `<div class="px-3 py-2 cursor-pointer hover:bg-gray-50" onclick="selectDetailCustomer(${c.id},'${c.name.replace(/'/g,"\\'")}')">
          ${c.name}
        </div>`
      ).join('');
      box.classList.remove('hidden');
    }

    function selectDetailCustomer(id, name) {
      selectedNewCustomerId = id;
      document.getElementById('detail-name-input').value = name;
      document.getElementById('detail-name-suggestions').classList.add('hidden');
    }

    function renderItemsEditor(items) {
      document.getElementById('items-editor').innerHTML = '';
      itemRowCount = 0;
      items.forEach(item => addItemRow(item));
      recalcSubtotal();
    }

    function addItemRow(item = null) {
      const editor = document.getElementById('items-editor');
      const id = itemRowCount++;
      const div = document.createElement('div');
      div.id = `er-${id}`;
      div.className = 'item-row border border-gray-100 rounded-xl p-3 space-y-2 bg-white';
      const productOptions = products.map(p =>
        `<option value="${p.id}" ${item?.product_id == p.id ? 'selected' : ''}>${p.name}</option>`
      ).join('');
      div.innerHTML = `
        <div class="flex items-center gap-2">
          <select id="er-prod-${id}" class="flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-sm bg-white" onchange="erProductChange(${id})">
            <option value="">選擇商品</option>${productOptions}
          </select>
          <button type="button" onclick="document.getElementById('er-${id}').remove(); recalcSubtotal()" class="text-gray-300 hover:text-red-400 shrink-0">
            <i class="ti ti-x"></i>
          </button>
        </div>
        <div id="er-size-btns-${id}" class="flex gap-1 flex-wrap"></div>
        <div id="er-custom-${id}" class="hidden grid grid-cols-2 gap-2">
          <div>
            <label class="text-xs text-gray-500">克數</label>
            <input type="number" id="er-cg-${id}" placeholder="g" min="0.1" step="0.1"
              class="w-full mt-0.5 border border-gray-200 rounded-lg px-3 py-1.5 text-sm" oninput="erRecalc(${id})">
          </div>
          <div>
            <label class="text-xs text-gray-500">售價 ($)</label>
            <input type="number" id="er-cp-${id}" placeholder="$" min="0"
              class="w-full mt-0.5 border border-gray-200 rounded-lg px-3 py-1.5 text-sm" oninput="erRecalc(${id})">
          </div>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          <label class="text-xs text-gray-500 shrink-0">數量</label>
          <input type="number" id="er-qty-${id}" value="${item?.quantity || 1}" min="1"
            class="w-16 border border-gray-200 rounded-lg px-2 py-1.5 text-sm text-center" oninput="erRecalc(${id})">
          <label class="text-xs text-gray-500 shrink-0">折扣</label>
          <input type="number" id="er-disc-${id}" value="${item?.discount_amount || 0}" min="0" placeholder="0"
            class="w-14 border border-gray-200 rounded-lg px-2 py-1.5 text-sm text-center" oninput="erRecalc(${id})">
          <label class="text-xs text-gray-500 shrink-0">運費</label>
          <input type="number" id="er-ship-${id}" value="${item?.shipping_fee || 0}" min="0" placeholder="0"
            class="w-14 border border-gray-200 rounded-lg px-2 py-1.5 text-sm text-center" oninput="erRecalc(${id})">
          <span id="er-sub-${id}" class="text-sm text-brand font-medium ml-auto"></span>
        </div>
        <input type="hidden" id="er-gram-${id}" value="0">
        <input type="hidden" id="er-price-${id}" value="0">
      `;
      editor.appendChild(div);
      if (item?.product_id) erProductChange(id, item);
    }

    function erProductChange(id, preselect = null) {
      const productId = parseInt(document.getElementById(`er-prod-${id}`).value);
      const product = products.find(p => p.id === productId);
      document.getElementById(`er-custom-${id}`).classList.add('hidden');
      if (!product) {
        document.getElementById(`er-size-btns-${id}`).innerHTML = '';
        erRecalc(id);
        return;
      }
      const sizes = [
        { g: 3,  price: product.price_3g },
        { g: 7,  price: product.price_7g },
        { g: 14, price: product.price_14g },
        { g: 28, price: product.price_28g },
        product.price_custom_grams && product.price_custom_price
          ? { g: product.price_custom_grams, price: product.price_custom_price } : null,
      ].filter(s => s && s.price != null);
      document.getElementById(`er-size-btns-${id}`).innerHTML =
        sizes.map(s =>
          `<button type="button" id="er-sz-${id}-${s.g}" onclick="erSetSize(${id},${s.g},${s.price})"
            class="px-2.5 py-1.5 text-xs bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition">
            ${s.g}g / $${s.price}
          </button>`
        ).join('') +
        `<button type="button" onclick="erSetSize(${id},0,0,'custom')"
          class="px-2.5 py-1.5 text-xs border border-gray-200 text-gray-500 rounded-lg hover:bg-gray-50">自訂</button>`;
      if (preselect) {
        const match = sizes.find(s => s.g == preselect.gram_size);
        if (match) {
          erSetSize(id, match.g, match.price);
        } else {
          erSetSize(id, 0, 0, 'custom');
          document.getElementById(`er-cg-${id}`).value = preselect.gram_size;
          document.getElementById(`er-cp-${id}`).value = preselect.unit_price;
        }
      }
      erRecalc(id);
    }

    function erSetSize(id, grams, price, mode) {
      document.querySelectorAll(`#er-size-btns-${id} button`).forEach(b => {
        b.className = b.textContent.trim() === '自訂'
          ? 'px-2.5 py-1.5 text-xs border border-gray-200 text-gray-500 rounded-lg hover:bg-gray-50'
          : 'px-2.5 py-1.5 text-xs bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition';
      });
      if (mode === 'custom') {
        document.getElementById(`er-custom-${id}`).classList.remove('hidden');
        document.getElementById(`er-gram-${id}`).value = 0;
        document.getElementById(`er-price-${id}`).value = 0;
      } else {
        document.getElementById(`er-custom-${id}`).classList.add('hidden');
        document.getElementById(`er-gram-${id}`).value = grams;
        document.getElementById(`er-price-${id}`).value = price;
        const btn = document.getElementById(`er-sz-${id}-${grams}`);
        if (btn) btn.className = 'px-2.5 py-1.5 text-xs bg-brand text-white rounded-lg font-medium transition';
      }
      erRecalc(id);
    }

    function erRecalc(id) {
      const customVisible = !document.getElementById(`er-custom-${id}`)?.classList.contains('hidden');
      const price = customVisible
        ? parseFloat(document.getElementById(`er-cp-${id}`)?.value || 0)
        : parseFloat(document.getElementById(`er-price-${id}`)?.value || 0);
      const qty = parseInt(document.getElementById(`er-qty-${id}`)?.value || 1);
      const disc = parseFloat(document.getElementById(`er-disc-${id}`)?.value || 0);
      const ship = parseFloat(document.getElementById(`er-ship-${id}`)?.value || 0);
      const sub = price * qty;
      const el = document.getElementById(`er-sub-${id}`);
      if (el) {
        let label = sub > 0 ? `$${sub.toFixed(0)}` : '';
        if (disc > 0) label += ` -$${disc.toFixed(0)}`;
        if (ship > 0) label += ` +運$${ship.toFixed(0)}`;
        el.textContent = label ? `小計 ${label}` : '';
      }
      recalcSubtotal();
    }

    function recalcSubtotal() {
      let total = 0;
      let totalDisc = 0;
      let totalShip = 0;
      document.querySelectorAll('#items-editor .item-row').forEach(row => {
        const id = row.id.replace('er-', '');
        const customVisible = !document.getElementById(`er-custom-${id}`)?.classList.contains('hidden');
        const price = customVisible
          ? parseFloat(document.getElementById(`er-cp-${id}`)?.value || 0)
          : parseFloat(document.getElementById(`er-price-${id}`)?.value || 0);
        const qty = parseInt(document.getElementById(`er-qty-${id}`)?.value || 1);
        const disc = parseFloat(document.getElementById(`er-disc-${id}`)?.value || 0);
        const ship = parseFloat(document.getElementById(`er-ship-${id}`)?.value || 0);
        total += price * qty;
        totalDisc += disc;
        totalShip += ship;
      });
      document.getElementById('items-subtotal-display').textContent = `$${total.toFixed(0)}`;
      document.getElementById('edit-final').value = Math.max(0, total - totalDisc + totalShip).toFixed(0);
    }

    function getItemsFromEditor() {
      const items = [];
      document.querySelectorAll('#items-editor .item-row').forEach(row => {
        const id = row.id.replace('er-', '');
        const productId = parseInt(document.getElementById(`er-prod-${id}`)?.value);
        if (!productId) return;
        const customVisible = !document.getElementById(`er-custom-${id}`)?.classList.contains('hidden');
        const gram = customVisible
          ? parseFloat(document.getElementById(`er-cg-${id}`)?.value || 0)
          : parseFloat(document.getElementById(`er-gram-${id}`)?.value || 0);
        const price = customVisible
          ? parseFloat(document.getElementById(`er-cp-${id}`)?.value || 0)
          : parseFloat(document.getElementById(`er-price-${id}`)?.value || 0);
        const qty = parseInt(document.getElementById(`er-qty-${id}`)?.value || 1);
        const disc = parseFloat(document.getElementById(`er-disc-${id}`)?.value || 0);
        const ship = parseFloat(document.getElementById(`er-ship-${id}`)?.value || 0);
        if (!gram || !price) return;
        items.push({ product_id: productId, gram_size: gram, quantity: qty, unit_price: price, discount_amount: disc, shipping_fee: ship });
      });
      return items;
    }

    function enterSearch() {
      document.getElementById('month-header').classList.add('hidden');
      document.getElementById('search-header').classList.remove('hidden');
      document.getElementById('calendar-section').classList.add('hidden');
      document.getElementById('day-orders-section').classList.add('hidden');
      document.getElementById('search-results').classList.remove('hidden');
      document.getElementById('search-input').focus();
      handleSearch();
    }

    function exitSearch() {
      document.getElementById('search-header').classList.add('hidden');
      document.getElementById('month-header').classList.remove('hidden');
      document.getElementById('calendar-section').classList.remove('hidden');
      document.getElementById('day-orders-section').classList.remove('hidden');
      document.getElementById('search-results').classList.add('hidden');
      document.getElementById('search-input').value = '';
      activeFilter = null;
      updateFilterButtons();
    }

    function toggleFilter(f) {
      activeFilter = activeFilter === f ? null : f;
      updateFilterButtons();
      handleSearch();
    }

    function updateFilterButtons() {
      const on = 'text-xs px-3 py-1.5 rounded-full border transition bg-brand text-white border-brand';
      const off = 'text-xs px-3 py-1.5 rounded-full border transition border-gray-200 text-gray-500';
      document.getElementById('filter-credit').className = activeFilter === 'credit' ? on : off;
      document.getElementById('filter-transfer').className = activeFilter === 'transfer' ? on : off;
    }

    async function handleSearch() {
      const q = document.getElementById('search-input').value.trim();
      const params = new URLSearchParams();
      if (q) params.set('q', q);
      if (activeFilter === 'credit') params.set('credit_unpaid', 'true');
      if (activeFilter === 'transfer') params.set('payment_method', '匯款');
      const res = await fetch('/api/orders/search?' + params);
      const orders = await res.json();
      document.getElementById('search-count').textContent = `共 ${orders.length} 筆`;
      document.getElementById('search-list').innerHTML = orders.map(o => renderOrderCard(o, true)).join('');
    }

    function renderOrderCard(o, showDate = false) {
      const summary = o.items.map(i => `${i.product?.name || '?'} ${i.gram_size}g×${i.quantity}`).join('、');
      const creditBadge = o.is_credit
        ? `<span class="text-xs px-1.5 py-0.5 rounded-full ${o.credit_paid ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${o.credit_paid ? '已還' : '未還'}</span>`
        : '';
      const payBadge = o.payment_method === '匯款'
        ? '<span class="text-xs px-1.5 py-0.5 rounded-full bg-indigo-100 text-indigo-700">匯款</span>'
        : '';
      return `
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-3 cursor-pointer hover:shadow-md transition" onclick='openDetail(${JSON.stringify(o)})'>
        <div class="flex justify-between items-start gap-2">
          <div class="flex-1 min-w-0">
            <div class="flex flex-wrap gap-1 items-center">
              <span class="font-semibold text-gray-900">${o.customer?.name || '?'}</span>
              ${showDate ? `<span class="text-xs text-gray-400">${o.order_date}</span>` : ''}
              <span class="text-xs px-1.5 py-0.5 rounded-full ${STATUS_COLORS[o.status] || 'bg-gray-100 text-gray-700'}">${o.status}</span>
              ${creditBadge}${payBadge}
            </div>
            <div class="text-xs text-gray-400 mt-0.5 truncate">${summary || '無品項'}</div>
          </div>
          <div class="text-right shrink-0">
            <div class="font-bold text-gray-900">$${o.final_amount.toFixed(0)}</div>
            ${(o.shipping_fee || 0) > 0 ? `<div class="text-xs text-gray-400">+運費 $${o.shipping_fee.toFixed(0)}</div>` : ''}
          </div>
        </div>
      </div>`;
    }

    function init() {
      loadProducts();
      const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: TZ });
      const [ty, tm] = todayStr.split('-');
      currentYear = parseInt(ty);
      currentMonth = parseInt(tm);
      document.getElementById('month-picker').addEventListener('change', function() {
        const [y, m] = this.value.split('-');
        currentYear = parseInt(y);
        currentMonth = parseInt(m);
        loadMonth();
      });
      loadMonth();
    }

    function prevMonth() {
      currentMonth--;
      if (currentMonth < 1) { currentMonth = 12; currentYear--; }
      loadMonth();
    }

    function nextMonth() {
      currentMonth++;
      if (currentMonth > 12) { currentMonth = 1; currentYear++; }
      loadMonth();
    }

    async function loadMonth(overrideDate = null) {
      document.getElementById('month-picker').value =
        `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      const params = new URLSearchParams({ year: currentYear, month: currentMonth });
      const res = await fetch('/api/orders/?' + params);
      allOrders = await res.json();
      ordersByDate = {};
      allOrders.forEach(o => {
        if (!ordersByDate[o.order_date]) ordersByDate[o.order_date] = [];
        ordersByDate[o.order_date].push(o);
      });
      renderCalendar();

      if (overrideDate) {
        selectDay(overrideDate);
      } else {
        const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: TZ });
        const [ty, tm] = todayStr.split('-');
        if (parseInt(ty) === currentYear && parseInt(tm) === currentMonth) {
          selectDay(todayStr);
        } else {
          clearDaySelection();
        }
      }
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      const rawFirstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
      const firstDay = (rawFirstDay + 6) % 7;
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const today = new Date().toLocaleDateString('en-CA', { timeZone: TZ });
      let cells = '';

      for (let i = 0; i < firstDay; i++) {
        cells += '<div></div>';
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const orders = ordersByDate[dateStr] || [];
        const isToday = dateStr === today;
        const isSelected = dateStr === selectedDate;
        const dayOfWeek = (firstDay + d - 1) % 7;
        const textColor = dayOfWeek === 6 ? 'text-red-500' : dayOfWeek === 5 ? 'text-blue-500' : 'text-gray-700';
        const totalAmt = orders.reduce((s, o) => s + o.final_amount, 0);
        const totalGrams = orders.reduce((s, o) => {
          if (o.status === '退款') return s;
          return s + o.items.reduce((ss, i) => ss + i.gram_size * i.quantity, 0);
        }, 0);

        cells += `
          <div onclick="selectDay('${dateStr}')"
            class="relative flex flex-col items-center py-1 rounded-lg cursor-pointer transition
              ${isSelected ? 'bg-brand text-white' : isToday ? 'bg-orange-50' : 'hover:bg-gray-50'}">
            <span class="text-sm font-medium leading-5 ${isSelected ? 'text-white' : textColor}">${d}</span>
            ${orders.length > 0 ? `
              <span class="text-xs leading-none mt-0.5 ${isSelected ? 'text-orange-100' : 'text-brand'} font-medium">
                ${orders.length}筆
              </span>
              <span class="text-xs leading-none ${isSelected ? 'text-orange-100' : 'text-gray-400'}">
                $${totalAmt.toFixed(0)}
              </span>
              <span class="text-xs leading-none ${isSelected ? 'text-orange-200' : 'text-gray-300'}">
                ${totalGrams.toFixed(0)}
              </span>
            ` : '<span class="h-4"></span>'}
          </div>`;
      }
      grid.innerHTML = cells;
    }

    function selectDay(dateStr) {
      selectedDate = dateStr;
      renderCalendar();
      const orders = ordersByDate[dateStr] || [];
      const label = document.getElementById('selected-day-label');
      const [y, m, d] = dateStr.split('-');
      label.textContent = `${parseInt(m)} 月 ${parseInt(d)} 日 — ${orders.length} 筆訂單`;
      label.classList.remove('hidden');
      renderDayOrders(orders);
    }

    function clearDaySelection() {
      selectedDate = null;
      document.getElementById('selected-day-label').classList.add('hidden');
      document.getElementById('orders-list').innerHTML = '';
      document.getElementById('empty-msg').classList.remove('hidden');
    }

    function renderDayOrders(orders) {
      const list = document.getElementById('orders-list');
      const empty = document.getElementById('empty-msg');
      if (!orders.length) { list.innerHTML = ''; empty.classList.remove('hidden'); empty.querySelector('div').textContent = '這天沒有訂單'; return; }
      empty.classList.add('hidden');
      list.innerHTML = orders.map(o => renderOrderCard(o)).join('');
    }

    function setPayMethod(method) {
      document.getElementById('pay-cash').className = `flex-1 py-2 rounded-lg text-sm font-medium border-2 transition ${method === '現金' ? 'bg-brand text-white border-brand' : 'border-gray-200 text-gray-500'}`;
      document.getElementById('pay-transfer').className = `flex-1 py-2 rounded-lg text-sm font-medium border-2 transition ${method === '匯款' ? 'bg-indigo-600 text-white border-indigo-600' : 'border-gray-200 text-gray-500'}`;
      document.getElementById('pay-cash').dataset.selected = method === '現金' ? '1' : '';
      document.getElementById('pay-transfer').dataset.selected = method === '匯款' ? '1' : '';
    }

    function openDetail(order) {
      currentOrder = order;
      document.getElementById('detail-customer-name').textContent = order.customer?.name || '?';
      document.getElementById('detail-name-display').classList.remove('hidden');
      document.getElementById('detail-name-edit').classList.add('hidden');
      document.getElementById('detail-name-suggestions').classList.add('hidden');
      selectedNewCustomerId = null;
      renderItemsEditor(order.items);
      setPayMethod(order.payment_method || '現金');
      document.getElementById('edit-date').value = order.order_date;
      document.getElementById('edit-status').value = order.status;
      document.getElementById('edit-final').value = order.final_amount;
      const itemDiscSum = (order.items || []).reduce((s, i) => s + (i.discount_amount || 0), 0);
      const discBanner = document.getElementById('old-discount-banner');
      if ((order.discount_amount || 0) > 0 && itemDiscSum === 0) {
        discBanner.classList.remove('hidden');
        discBanner.textContent = `此訂單有 $${order.discount_amount.toFixed(0)} 折扣尚未分配到品項，請在各品項的「折扣」欄填入後儲存。`;
      } else {
        discBanner.classList.add('hidden');
      }
      const itemShipSum = (order.items || []).reduce((s, i) => s + (i.shipping_fee || 0), 0);
      const shipBanner = document.getElementById('old-shipping-banner');
      if ((order.shipping_fee || 0) > 0 && itemShipSum === 0) {
        shipBanner.classList.remove('hidden');
        shipBanner.textContent = `此訂單有 $${order.shipping_fee.toFixed(0)} 運費尚未分配到品項，請在各品項的「運費」欄填入後儲存。`;
      } else {
        shipBanner.classList.add('hidden');
      }
      document.getElementById('edit-credit').checked = order.is_credit;
      document.getElementById('edit-credit-paid').checked = order.credit_paid;
      document.getElementById('edit-notes').value = order.notes || '';
      document.getElementById('detail-modal').classList.remove('hidden');
    }

    function closeDetail() {
      document.getElementById('detail-modal').classList.add('hidden');
      currentOrder = null;
    }

    async function deleteOrder() {
      if (!currentOrder) return;
      if (!confirm('確定要刪除這筆訂單？')) return;
      const keepDate = selectedDate;
      await fetch(`/api/orders/${currentOrder.id}`, { method: 'DELETE' });
      closeDetail();
      loadMonth(keepDate);
    }

    async function saveOrder() {
      if (!currentOrder) return;
      const keepDate = selectedDate;

      let customerId = currentOrder.customer_id;
      if (!document.getElementById('detail-name-edit').classList.contains('hidden')) {
        const newName = document.getElementById('detail-name-input').value.trim();
        if (newName && newName !== currentOrder.customer?.name) {
          if (selectedNewCustomerId) {
            customerId = selectedNewCustomerId;
          } else {
            await ensureCustomers();
            const exact = customers.find(c => c.name === newName);
            if (exact) {
              customerId = exact.id;
            } else {
              const res = await fetch('/api/customers/', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ name: newName }),
              });
              const c = await res.json();
              customerId = c.id;
              customers.push(c);
            }
          }
        }
      }

      await fetch(`/api/orders/${currentOrder.id}/items`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ items: getItemsFromEditor() }),
      });
      await fetch(`/api/orders/${currentOrder.id}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          customer_id: customerId !== currentOrder.customer_id ? customerId : undefined,
          order_date: document.getElementById('edit-date').value || null,
          status: document.getElementById('edit-status').value,
          payment_method: document.getElementById('pay-transfer').dataset.selected ? '匯款' : '現金',
          is_credit: document.getElementById('edit-credit').checked,
          credit_paid: document.getElementById('edit-credit-paid').checked,
          notes: document.getElementById('edit-notes').value || null,
        }),
      });
      closeDetail();
      loadMonth(keepDate);
    }

    document.getElementById('detail-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeDetail();
    });

    init();
  </script>
</body>
</html>
