<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客戶</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { coffee: { 50:'#fdf8f0',100:'#faebd7',200:'#f5d5a8',300:'#edb96d',400:'#e09a3e',500:'#c97d22',600:'#a8631a',700:'#864e16',800:'#6b3e13',900:'#573310' } }, zIndex: { '60': '60' } } }
    }
  </script>
</head>
<body class="bg-coffee-50 min-h-screen pb-20">

  <header class="bg-coffee-800 text-white px-4 py-4 sticky top-0 z-10 shadow">
    <h1 class="text-xl font-bold">客戶</h1>
  </header>

  <div class="px-3 pt-3 pb-1 max-w-2xl mx-auto">
    <input type="text" id="search-input" placeholder="搜尋客戶名稱..."
      class="w-full border border-coffee-200 rounded-xl px-3 py-2.5 text-sm bg-white"
      oninput="filterCustomers()">
  </div>

  <main class="px-3 py-2 max-w-2xl mx-auto space-y-4">
    <!-- 欠帳總覽 -->
    <section class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <div class="px-4 py-3 border-b border-coffee-100 flex items-center justify-between">
        <h2 class="font-semibold text-red-700">欠帳客戶</h2>
        <span id="credit-badge" class="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full hidden"></span>
      </div>
      <div id="credit-list" class="divide-y divide-coffee-50">
        <div class="px-4 py-3 text-sm text-gray-400 text-center">載入中...</div>
      </div>
    </section>

    <!-- 客戶列表 -->
    <section>
      <div id="customers-list" class="space-y-2"></div>
    </section>
  </main>

  <!-- 客戶訂單歷史 Modal -->
  <div id="customer-modal" class="fixed inset-0 bg-black/50 z-50 hidden overflow-y-auto">
    <div class="min-h-screen flex items-end sm:items-center justify-center">
      <div class="bg-white w-full max-w-lg rounded-t-2xl sm:rounded-2xl p-5 mx-auto">
        <div class="flex justify-between items-center mb-4">
          <div>
            <h2 class="text-lg font-bold text-coffee-900" id="cust-name"></h2>
            <div class="text-xs text-gray-400" id="cust-sub"></div>
          </div>
          <button onclick="closeCustomerModal()" class="text-gray-400 text-2xl leading-none">&times;</button>
        </div>
        <div id="cust-stats" class="grid grid-cols-3 gap-2 mb-4"></div>
        <div class="text-sm font-semibold text-coffee-800 mb-2">訂單記錄</div>
        <div id="cust-orders" class="space-y-2 max-h-80 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <!-- 訂單編輯 Modal -->
  <div id="order-edit-modal" class="fixed inset-0 bg-black/50 z-60 hidden overflow-y-auto">
    <div class="min-h-screen flex items-end sm:items-center justify-center">
      <div class="bg-white w-full max-w-lg rounded-t-2xl sm:rounded-2xl p-5 mx-auto">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-base font-bold text-coffee-900">編輯訂單</h2>
          <button onclick="closeOrderEdit()" class="text-gray-400 text-2xl leading-none">&times;</button>
        </div>
        <div class="space-y-4">
          <div>
            <label class="text-xs text-gray-500">訂單日期</label>
            <input type="date" id="edit-date" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-xs text-gray-500">狀態</label>
            <div class="grid grid-cols-3 gap-2 mt-1" id="edit-status-btns"></div>
          </div>
          <div>
            <label class="text-xs text-gray-500">付款方式</label>
            <div class="flex gap-2 mt-1">
              <button id="edit-pay-cash" type="button" onclick="setEditPay('現金')" class="flex-1 py-2 rounded-xl text-sm font-medium border-2 transition">現金</button>
              <button id="edit-pay-transfer" type="button" onclick="setEditPay('匯款')" class="flex-1 py-2 rounded-xl text-sm font-medium border-2 transition">匯款</button>
            </div>
          </div>
          <div class="flex gap-4">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="edit-is-credit" class="accent-coffee-600 w-4 h-4">
              <span class="text-sm">賒帳</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="edit-credit-paid" class="accent-green-600 w-4 h-4">
              <span class="text-sm">已還款</span>
            </label>
          </div>
          <div>
            <label class="text-xs text-gray-500">折扣金額</label>
            <input type="number" id="edit-discount" min="0" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-xs text-gray-500">備註</label>
            <textarea id="edit-notes" rows="2" class="w-full mt-1 border border-coffee-200 rounded-xl px-3 py-2 text-sm"></textarea>
          </div>
        </div>
        <button onclick="saveOrderEdit()" class="w-full mt-5 bg-coffee-700 text-white py-3 rounded-xl font-semibold">儲存</button>
      </div>
    </div>
  </div>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-coffee-200 flex justify-around py-1.5 z-40">
    <a href="/" class="flex flex-col items-center text-gray-400"><span class="text-xl">📋</span><span class="text-xs">今日</span></a>
    <a href="/static/new_order.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">➕</span><span class="text-xs">新增</span></a>
    <a href="/static/orders.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">📦</span><span class="text-xs">訂單</span></a>
    <a href="/static/customers.html" class="flex flex-col items-center text-coffee-700 font-medium"><span class="text-xl">👥</span><span class="text-xs">客戶</span></a>
    <a href="/static/inventory.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">🏪</span><span class="text-xs">庫存</span></a>
    <a href="/static/reports.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">📊</span><span class="text-xs">報表</span></a>
  </nav>

  <script>
    const STATUS_COLORS = {
      '待確認':'bg-yellow-100 text-yellow-800','處理中':'bg-blue-100 text-blue-800',
      '已出貨':'bg-purple-100 text-purple-800','完成':'bg-green-100 text-green-800','退款':'bg-red-100 text-red-800',
    };
    const STATUSES = ['待確認','處理中','已出貨','完成','退款'];

    let allCustomers = [];
    let currentCustomerId = null;
    let editingOrderId = null;
    let editPayMethod = '現金';

    async function load() {
      const [custRes, creditRes] = await Promise.all([
        fetch('/api/customers/'),
        fetch('/api/customers/credits'),
      ]);
      allCustomers = await custRes.json();
      const credits = await creditRes.json();
      renderCustomers(allCustomers);
      renderCredits(credits);
    }

    function renderCredits(credits) {
      const list = document.getElementById('credit-list');
      const badge = document.getElementById('credit-badge');
      if (!credits.length) {
        list.innerHTML = '<div class="px-4 py-3 text-sm text-green-600 text-center">目前沒有欠帳</div>';
        return;
      }
      badge.textContent = credits.length + ' 人';
      badge.classList.remove('hidden');
      list.innerHTML = credits.map(c => `
        <div class="px-4 py-3 flex justify-between items-center cursor-pointer hover:bg-coffee-50"
          onclick="openCustomer(${c.id}, true)">
          <div>
            <div class="font-medium text-coffee-900">${c.name}</div>
            <div class="text-xs text-gray-400">${c.order_count} 筆未還</div>
          </div>
          <div class="font-bold text-red-600">$${c.total_owed}</div>
        </div>
      `).join('');
    }

    function filterCustomers() {
      const q = document.getElementById('search-input').value.toLowerCase();
      renderCustomers(q ? allCustomers.filter(c => c.name.toLowerCase().includes(q)) : allCustomers);
    }

    function renderCustomers(customers) {
      const list = document.getElementById('customers-list');
      if (!customers.length) {
        list.innerHTML = '<div class="text-center text-gray-400 py-10 text-sm">沒有客戶</div>';
        return;
      }
      list.innerHTML = customers.map(c => `
        <div class="bg-white rounded-xl shadow-sm px-4 py-3 cursor-pointer hover:shadow-md transition"
          onclick="openCustomer(${c.id})">
          <div class="flex justify-between items-center">
            <div>
              <div class="font-semibold text-coffee-900">${c.name}</div>
              ${c.messenger_name ? `<div class="text-xs text-gray-400">${c.messenger_name}</div>` : ''}
            </div>
            <span class="text-gray-300 text-xl">›</span>
          </div>
        </div>
      `).join('');
    }

    async function openCustomer(id, creditOnly = false) {
      currentCustomerId = id;
      const res = await fetch(`/api/customers/${id}/orders`);
      const data = await res.json();
      const c = data.customer;

      document.getElementById('cust-name').textContent = c.name;
      document.getElementById('cust-sub').textContent = [c.messenger_name, c.phone].filter(Boolean).join('　') || '';

      document.getElementById('cust-stats').innerHTML = `
        <div class="bg-coffee-50 rounded-xl p-3 text-center">
          <div class="text-xs text-gray-500 mb-0.5">訂單數</div>
          <div class="font-bold text-coffee-800 text-lg">${data.total_orders}</div>
        </div>
        <div class="bg-coffee-50 rounded-xl p-3 text-center">
          <div class="text-xs text-gray-500 mb-0.5">已消費</div>
          <div class="font-bold text-coffee-800 text-lg">$${data.total_spent}</div>
        </div>
        <div class="rounded-xl p-3 text-center ${data.credit_owed > 0 ? 'bg-red-50' : 'bg-green-50'}">
          <div class="text-xs text-gray-500 mb-0.5">欠款</div>
          <div class="font-bold text-lg ${data.credit_owed > 0 ? 'text-red-600' : 'text-green-600'}">$${data.credit_owed}</div>
        </div>
      `;

      const orders = creditOnly
        ? data.orders.filter(o => o.is_credit && !o.credit_paid)
        : data.orders;

      document.getElementById('cust-orders').innerHTML = orders.length ? orders.map(o => {
        const summary = o.items.map(i => `${i.product_name} ${i.gram_size}g×${i.quantity}`).join('、');
        const creditBadge = o.is_credit
          ? `<span class="text-xs px-1.5 py-0.5 rounded-full ${o.credit_paid ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${o.credit_paid ? '已還' : '未還'}</span>`
          : '';
        return `
        <div class="border border-coffee-100 rounded-xl p-3 cursor-pointer hover:bg-coffee-50 active:bg-coffee-100 transition"
          onclick="openOrderEdit(${JSON.stringify(o).replace(/"/g,'&quot;')})">
          <div class="flex justify-between items-start gap-2">
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap items-center gap-1">
                <span class="text-xs text-gray-500">${o.order_date}</span>
                <span class="text-xs px-1.5 py-0.5 rounded-full ${STATUS_COLORS[o.status] || 'bg-gray-100 text-gray-600'}">${o.status}</span>
                ${creditBadge}
              </div>
              <div class="text-xs text-gray-500 mt-0.5 truncate">${summary || '無品項'}</div>
            </div>
            <div class="text-right shrink-0">
              <div class="font-semibold text-coffee-800">$${o.final_amount.toFixed(0)}</div>
              <div class="text-xs text-coffee-400">點擊編輯</div>
            </div>
          </div>
        </div>`;
      }).join('') : '<div class="text-sm text-gray-400 text-center py-4">尚無訂單</div>';

      document.getElementById('customer-modal').classList.remove('hidden');
    }

    function closeCustomerModal() {
      document.getElementById('customer-modal').classList.add('hidden');
    }

    function openOrderEdit(o) {
      editingOrderId = o.id;
      document.getElementById('edit-date').value = o.order_date;
      document.getElementById('edit-is-credit').checked = o.is_credit;
      document.getElementById('edit-credit-paid').checked = o.credit_paid;
      document.getElementById('edit-discount').value = o.discount_amount || 0;
      document.getElementById('edit-notes').value = o.notes || '';
      editPayMethod = o.payment_method || '現金';
      setEditPay(editPayMethod);
      document.getElementById('edit-status-btns').innerHTML = STATUSES.map(s =>
        `<button onclick="setEditStatus('${s}')" id="edit-s-${s}"
          class="py-2 rounded-xl text-xs font-medium border-2 transition ${STATUS_COLORS[s]} ${o.status===s?'ring-2 ring-coffee-700':''}">${s}</button>`
      ).join('');
      document.getElementById('edit-status-btns').dataset.status = o.status;
      document.getElementById('order-edit-modal').classList.remove('hidden');
    }

    function setEditStatus(s) {
      document.getElementById('edit-status-btns').dataset.status = s;
      STATUSES.forEach(st => {
        const btn = document.getElementById(`edit-s-${st}`);
        btn.classList.toggle('ring-2', st === s);
        btn.classList.toggle('ring-coffee-700', st === s);
      });
    }

    function setEditPay(method) {
      editPayMethod = method;
      document.getElementById('edit-pay-cash').className = `flex-1 py-2 rounded-xl text-sm font-medium border-2 transition ${method==='現金'?'bg-coffee-700 text-white border-coffee-700':'border-coffee-200 text-gray-500'}`;
      document.getElementById('edit-pay-transfer').className = `flex-1 py-2 rounded-xl text-sm font-medium border-2 transition ${method==='匯款'?'bg-indigo-600 text-white border-indigo-600':'border-coffee-200 text-gray-500'}`;
    }

    async function saveOrderEdit() {
      const status = document.getElementById('edit-status-btns').dataset.status;
      const discount = parseFloat(document.getElementById('edit-discount').value) || 0;
      await fetch(`/api/orders/${editingOrderId}`, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          order_date: document.getElementById('edit-date').value,
          status,
          payment_method: editPayMethod,
          is_credit: document.getElementById('edit-is-credit').checked,
          credit_paid: document.getElementById('edit-credit-paid').checked,
          discount_amount: discount,
          notes: document.getElementById('edit-notes').value.trim() || null,
        }),
      });
      closeOrderEdit();
      openCustomer(currentCustomerId);
    }

    function closeOrderEdit() {
      document.getElementById('order-edit-modal').classList.add('hidden');
      editingOrderId = null;
    }

    document.getElementById('customer-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeCustomerModal();
    });
    document.getElementById('order-edit-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeOrderEdit();
    });

    load();
  </script>
</body>
</html>
