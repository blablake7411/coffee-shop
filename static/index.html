<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日訂單</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { coffee: { 50:'#fdf8f0',100:'#faebd7',200:'#f5d5a8',300:'#edb96d',400:'#e09a3e',500:'#c97d22',600:'#a8631a',700:'#864e16',800:'#6b3e13',900:'#573310' } } } }
    }
  </script>
</head>
<body class="bg-coffee-50 min-h-screen pb-20">

  <header class="bg-coffee-800 text-white px-4 py-4 flex items-center justify-between sticky top-0 z-10 shadow">
    <h1 class="text-xl font-bold">今日訂單</h1>
    <div class="text-right">
      <div class="text-xs text-coffee-300" id="today-date"></div>
      <div class="text-lg font-semibold" id="today-total">$0</div>
    </div>
  </header>

  <main class="px-3 py-4 max-w-lg mx-auto">
    <div id="orders-list" class="space-y-3"></div>
    <div id="empty-msg" class="text-center text-coffee-400 py-16 hidden">
      <div class="text-5xl mb-3">☕</div>
      <div class="text-lg">今天還沒有訂單</div>
    </div>

  </main>

  <!-- 狀態快改 Modal -->
  <div id="status-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-end justify-center">
    <div class="bg-white w-full max-w-lg rounded-t-2xl p-5">
      <div class="text-center font-semibold text-coffee-800 mb-1" id="modal-customer-name"></div>
      <div class="text-center text-sm text-gray-500 mb-4" id="modal-order-summary"></div>
      <p class="text-sm font-medium text-gray-600 mb-2">變更狀態：</p>
      <div class="grid grid-cols-2 gap-2 mb-3" id="status-buttons"></div>
      <button onclick="deleteOrder()" class="w-full py-2 text-sm text-red-500 border border-red-200 rounded-xl mb-1">刪除訂單</button>
      <button onclick="closeModal()" class="w-full py-2 text-sm text-gray-500 border border-gray-200 rounded-xl">取消</button>
    </div>
  </div>

  <!-- 底部導覽 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-coffee-200 flex justify-around py-1.5 z-40">
    <a href="/" class="flex flex-col items-center text-coffee-700 font-medium"><span class="text-xl">📋</span><span class="text-xs">今日</span></a>
    <a href="/static/new_order.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">➕</span><span class="text-xs">新增</span></a>
    <a href="/static/orders.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">📦</span><span class="text-xs">訂單</span></a>
    <a href="/static/customers.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">👥</span><span class="text-xs">客戶</span></a>
    <a href="/static/inventory.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">🏪</span><span class="text-xs">庫存</span></a>
    <a href="/static/reports.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">📊</span><span class="text-xs">報表</span></a>
  </nav>

  <script>
    const STATUSES = ['待確認','處理中','已出貨','完成','退款'];
    const STATUS_COLORS = {
      '待確認': 'bg-yellow-100 text-yellow-800',
      '處理中': 'bg-blue-100 text-blue-800',
      '已出貨': 'bg-purple-100 text-purple-800',
      '完成': 'bg-green-100 text-green-800',
      '退款': 'bg-red-100 text-red-800',
    };

    let currentOrderId = null;

    document.getElementById('today-date').textContent = new Date().toLocaleDateString('zh-TW', {month:'long',day:'numeric',weekday:'short'});

    async function load() {
      const todayStr = new Date().toLocaleDateString('en-CA');
      const res = await fetch(`/api/orders/today?local_date=${todayStr}`);
      const orders = await res.json();
      render(orders);
    }

    function render(orders) {
      const list = document.getElementById('orders-list');
      const empty = document.getElementById('empty-msg');
      if (orders.length === 0) { list.innerHTML=''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      let total = 0;
      list.innerHTML = orders.map(o => {
        if (o.status !== '退款') total += o.final_amount;
        const itemSummary = o.items.map(i => `${i.product?.name || '?'} ${i.gram_size}g×${i.quantity}`).join('、');
        const creditBadge = o.is_credit
          ? `<span class="text-xs px-2 py-0.5 rounded-full ${o.credit_paid ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${o.credit_paid ? '賒帳已還' : '賒帳未還'}</span>`
          : '';
        return `
        <div class="bg-white rounded-2xl shadow-sm p-4 cursor-pointer active:scale-95 transition" onclick="openModal(${o.id}, '${(o.customer?.name||'').replace(/'/g,"\\'")}', '${itemSummary.replace(/'/g,"\\'")}')">
          <div class="flex items-start justify-between gap-2">
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-coffee-900 text-base truncate">${o.customer?.name || '未知客人'}</div>
              <div class="text-xs text-gray-500 mt-0.5 truncate">${itemSummary || '無品項'}</div>
              <div class="flex flex-wrap gap-1 mt-2">
                <span class="text-xs px-2 py-0.5 rounded-full font-medium ${STATUS_COLORS[o.status]||'bg-gray-100 text-gray-700'}">${o.status}</span>
                ${creditBadge}
              </div>
            </div>
            <div class="text-right shrink-0">
              <div class="text-lg font-bold text-coffee-800">$${o.final_amount.toFixed(0)}</div>
              <div class="text-xs text-gray-400">${new Date(o.created_at).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}</div>
            </div>
          </div>
        </div>`;
      }).join('');

      document.getElementById('today-total').textContent = '$' + total.toFixed(0);
    }

    function openModal(id, customerName, summary) {
      currentOrderId = id;
      document.getElementById('modal-customer-name').textContent = customerName;
      document.getElementById('modal-order-summary').textContent = summary;
      const btns = document.getElementById('status-buttons');
      btns.innerHTML = STATUSES.map(s => `
        <button onclick="changeStatus('${s}')" class="py-3 rounded-xl text-sm font-medium border-2 border-coffee-200 hover:bg-coffee-100 active:bg-coffee-200 transition ${STATUS_COLORS[s]}">${s}</button>
      `).join('');
      document.getElementById('status-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('status-modal').classList.add('hidden');
      currentOrderId = null;
    }

    async function changeStatus(status) {
      if (!currentOrderId) return;
      await fetch(`/api/orders/${currentOrderId}`, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({status}),
      });
      closeModal();
      load();
    }

    async function deleteOrder() {
      if (!currentOrderId) return;
      if (!confirm('確定要刪除這筆訂單？')) return;
      await fetch(`/api/orders/${currentOrderId}`, { method: 'DELETE' });
      closeModal();
      load();
    }

    document.getElementById('status-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    load();
  </script>
</body>
</html>
