<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日訂單</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        coffee: { 50:'#fafaf9',100:'#f5f5f4',200:'#e7e5e4',300:'#d6d3d1',400:'#a8a29e',500:'#78716c',600:'#57534e',700:'#44403c',800:'#292524',900:'#1c1917' },
        brand: '#D85A30'
      }}}
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

  <header class="bg-white border-b border-gray-200 px-4 py-4 flex items-center justify-between sticky top-0 z-10">
    <h1 class="text-xl font-bold text-gray-900">今日訂單</h1>
    <div class="text-right">
      <div class="text-xs text-gray-400" id="today-date"></div>
      <div class="text-lg font-semibold text-brand">
        <span id="today-total">$0</span>
        <span class="text-sm font-normal text-gray-400 ml-1" id="today-grams"></span>
      </div>
    </div>
  </header>

  <main class="px-3 py-4 max-w-lg mx-auto">
    <!-- 品項統計摺疊卡片 -->
    <div id="product-summary-wrap" class="hidden mb-3">
      <button onclick="toggleSummary()" class="w-full bg-white rounded-2xl border border-gray-100 shadow-sm px-4 py-3 flex items-center justify-between text-left">
        <span class="text-sm font-semibold text-gray-800">品項銷售統計</span>
        <i id="summary-chevron" class="ti ti-chevron-down text-gray-400 transition-transform"></i>
      </button>
      <div id="product-summary-body" class="hidden bg-white rounded-2xl border border-gray-100 shadow-sm px-4 pb-3 -mt-2 pt-4 rounded-t-none border-t-0">
        <div id="product-summary-rows"></div>
        <div id="shipping-summary-row" class="hidden flex items-center justify-between text-sm py-2 border-t border-gray-100 mt-1">
          <span class="text-gray-500">運費</span>
          <span class="font-medium text-gray-700" id="shipping-summary-amt"></span>
        </div>
      </div>
    </div>

    <div id="orders-list" class="space-y-3"></div>
    <div id="empty-msg" class="text-center text-gray-400 py-16 hidden">
      <div class="text-5xl mb-3">☕</div>
      <div class="text-lg">今天還沒有訂單</div>
    </div>
  </main>

  <!-- 今日訂單 Modal -->
  <div id="status-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-2xl p-5">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold text-gray-900" id="modal-customer-name"></h2>
        <button onclick="closeModal()" class="text-gray-400 text-2xl leading-none">&times;</button>
      </div>
      <p class="text-sm font-medium text-gray-600 mb-2">狀態</p>
      <div class="grid grid-cols-3 gap-2 mb-4" id="status-buttons"></div>
      <div id="modal-items-qty" class="space-y-2 mb-4"></div>
      <button onclick="saveOrderModal()" class="w-full bg-brand text-white py-3 rounded-xl font-medium mb-2">儲存</button>
      <button onclick="deleteOrder()" class="w-full border border-red-200 text-red-500 py-2.5 rounded-xl text-sm font-medium">刪除訂單</button>
    </div>
  </div>

  <!-- 底部導覽 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-1.5 z-40">
    <a href="/" class="flex flex-col items-center text-brand font-medium"><i class="ti ti-calendar-event text-xl"></i><span class="text-xs">今日</span></a>
    <a href="/static/new_order.html" class="flex flex-col items-center text-gray-400"><i class="ti ti-plus text-xl"></i><span class="text-xs">新增</span></a>
    <a href="/static/orders.html" class="flex flex-col items-center text-gray-400"><i class="ti ti-package text-xl"></i><span class="text-xs">訂單</span></a>
    <a href="/static/customers.html" class="flex flex-col items-center text-gray-400"><i class="ti ti-users text-xl"></i><span class="text-xs">客戶</span></a>
    <a href="/static/inventory.html" class="flex flex-col items-center text-gray-400"><i class="ti ti-box text-xl"></i><span class="text-xs">庫存</span></a>
    <a href="/static/reports.html" class="flex flex-col items-center text-gray-400"><i class="ti ti-chart-bar text-xl"></i><span class="text-xs">報表</span></a>
  </nav>

  <script>
    const STATUS_COLORS = {
      '待確認': 'bg-yellow-100 text-yellow-800',
      '處理中': 'bg-blue-100 text-blue-800',
      '已出貨': 'bg-purple-100 text-purple-800',
      '完成': 'bg-green-100 text-green-800',
      '退款': 'bg-red-100 text-red-800',
    };
    const STATUSES = ['待確認','處理中','已出貨','完成','退款'];

    let products = [];
    let currentOrderId = null;
    let currentOrder = null;
    let selectedStatus = null;

    async function loadProducts() {
      const res = await fetch('/api/products/');
      products = await res.json();
    }

    const TZ = 'Australia/Sydney';
    document.getElementById('today-date').textContent = new Date().toLocaleDateString('zh-TW', {month:'long',day:'numeric',weekday:'short', timeZone: TZ});

    async function load() {
      const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: TZ });
      const res = await fetch(`/api/orders/today?local_date=${todayStr}`);
      const orders = await res.json();
      render(orders);
    }

    function renderCard(o) {
      const itemSummary = o.items.map(i => `${i.product?.name || '?'} ${i.gram_size}g×${i.quantity}`).join('、');
      const creditBadge = o.is_credit
        ? `<span class="text-xs px-2 py-0.5 rounded-full ${o.credit_paid ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${o.credit_paid ? '賒帳已還' : '賒帳未還'}</span>`
        : '';
      return `
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 cursor-pointer active:scale-95 transition" onclick='openModal(${JSON.stringify(o)})'>
        <div class="flex items-start justify-between gap-2">
          <div class="flex-1 min-w-0">
            <div class="font-semibold text-gray-900 text-base truncate">${o.customer?.name || '未知客人'}</div>
            <div class="text-xs text-gray-400 mt-0.5 truncate">${itemSummary || '無品項'}</div>
            <div class="flex flex-wrap gap-1 mt-2">
              <span class="text-xs px-2 py-0.5 rounded-full font-medium ${STATUS_COLORS[o.status]||'bg-gray-100 text-gray-700'}">${o.status}</span>
              ${creditBadge}
            </div>
          </div>
          <div class="text-right shrink-0">
            <div class="text-lg font-bold text-gray-900">$${o.final_amount.toFixed(0)}</div>
            ${(o.shipping_fee || 0) > 0 ? `<div class="text-xs text-gray-400">+運費 $${o.shipping_fee.toFixed(0)}</div>` : ''}
            <div class="text-xs text-gray-400">${new Date(o.created_at + 'Z').toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit', timeZone: TZ})}</div>
          </div>
        </div>
      </div>`;
    }

    function render(orders) {
      const list = document.getElementById('orders-list');
      const empty = document.getElementById('empty-msg');
      if (orders.length === 0) { list.innerHTML=''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      const active = orders.filter(o => ['待確認','處理中','已出貨'].includes(o.status));
      const done = orders.filter(o => ['完成','退款'].includes(o.status));

      let total = 0, totalGrams = 0, totalShipping = 0;
      const productMap = {};
      orders.forEach(o => {
        if (o.status !== '退款') {
          total += o.final_amount;
          totalShipping += (o.shipping_fee || 0);
          o.items.forEach(i => {
            totalGrams += i.gram_size * i.quantity;
            const name = i.product?.name || '?';
            if (!productMap[name]) productMap[name] = { revenue: 0, grams: 0 };
            productMap[name].revenue += i.subtotal;
            productMap[name].grams += i.gram_size * i.quantity;
          });
        }
      });

      const summaryWrap = document.getElementById('product-summary-wrap');
      if (Object.keys(productMap).length > 0) {
        summaryWrap.classList.remove('hidden');
        const sorted = Object.entries(productMap).sort((a, b) => b[1].revenue - a[1].revenue);
        document.getElementById('product-summary-rows').innerHTML = sorted.map(([name, v]) => `
          <div class="flex items-center justify-between text-sm py-2 border-b border-gray-50 last:border-0">
            <span class="text-gray-700 flex-1">${name}</span>
            <span class="text-gray-400 text-xs w-14 text-right">${v.grams.toFixed(0)}g</span>
            <span class="font-semibold text-gray-900 w-16 text-right">$${v.revenue.toFixed(0)}</span>
          </div>`).join('');
        const shippingRow = document.getElementById('shipping-summary-row');
        if (totalShipping > 0) {
          shippingRow.classList.remove('hidden');
          shippingRow.classList.add('flex');
          document.getElementById('shipping-summary-amt').textContent = '$' + totalShipping.toFixed(0);
        } else {
          shippingRow.classList.add('hidden');
        }
      } else {
        summaryWrap.classList.add('hidden');
      }

      let html = '';
      if (active.length) {
        html += `<div class="text-xs font-semibold text-gray-400 tracking-wide mb-2 px-1">進行中</div>`;
        html += `<div class="space-y-3">${active.map(renderCard).join('')}</div>`;
      }
      if (done.length) {
        html += `<div class="text-xs font-semibold text-gray-400 tracking-wide mb-2 ${active.length ? 'mt-5' : ''} px-1">已完成</div>`;
        html += `<div class="space-y-3 opacity-60">${done.map(renderCard).join('')}</div>`;
      }
      list.innerHTML = html;
      document.getElementById('today-total').textContent = '$' + total.toFixed(0);
      document.getElementById('today-grams').textContent = totalGrams > 0 ? totalGrams.toFixed(0) : '';
    }

    function openModal(order) {
      currentOrderId = order.id;
      currentOrder = JSON.parse(JSON.stringify(order));
      selectedStatus = order.status;
      document.getElementById('modal-customer-name').textContent = order.customer?.name || '?';

      document.getElementById('status-buttons').innerHTML = STATUSES.map(s =>
        `<button onclick="selectStatus('${s}')" id="status-btn-${s}"
          class="py-2.5 rounded-xl text-sm font-medium border-2 transition ${s === order.status ? STATUS_COLORS[s] + ' border-transparent' : 'border-gray-200 text-gray-500'}">
          ${s}
        </button>`
      ).join('');

      const items = order.items;
      document.getElementById('modal-items-qty').innerHTML = items.length
        ? items.map((item, i) => {
            const product = products.find(p => p.id === item.product_id);
            const sizes = product ? [
              { g: 3,  price: product.price_3g },
              { g: 7,  price: product.price_7g },
              { g: 14, price: product.price_14g },
              { g: 28, price: product.price_28g },
              product.price_custom_grams && product.price_custom_price
                ? { g: product.price_custom_grams, price: product.price_custom_price } : null,
            ].filter(s => s && s.price != null) : [];
            const gramBtns = sizes.map(s =>
              `<button type="button" id="gram-btn-${i}-${s.g}" onclick="changeGram(${i},${s.g},${s.price})"
                class="px-2.5 py-1.5 text-xs rounded-lg font-medium transition ${s.g == item.gram_size ? 'bg-brand text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}">
                ${s.g}g / $${s.price}
              </button>`
            ).join('');
            return `
            <div class="bg-gray-50 rounded-xl p-3 space-y-2">
              <div class="text-sm font-medium text-gray-700">${item.product?.name || '?'}</div>
              <div class="flex gap-1 flex-wrap">${gramBtns}</div>
              <div class="flex items-center gap-3">
                <span class="text-xs text-gray-500">數量</span>
                <button type="button" onclick="changeQty(${i},-1)"
                  class="w-7 h-7 rounded-full border border-gray-300 text-gray-500 flex items-center justify-center text-lg leading-none">−</button>
                <span id="qty-val-${i}" class="w-5 text-center text-sm font-semibold">${item.quantity}</span>
                <button type="button" onclick="changeQty(${i},1)"
                  class="w-7 h-7 rounded-full border border-gray-300 text-gray-500 flex items-center justify-center text-lg leading-none">+</button>
              </div>
            </div>`;
          }).join('')
        : '';

      document.getElementById('status-modal').classList.remove('hidden');
    }

    function selectStatus(s) {
      selectedStatus = s;
      STATUSES.forEach(st => {
        const btn = document.getElementById(`status-btn-${st}`);
        if (btn) btn.className = `py-2.5 rounded-xl text-sm font-medium border-2 transition ${st === s ? STATUS_COLORS[st] + ' border-transparent' : 'border-gray-200 text-gray-500'}`;
      });
    }

    function changeQty(i, delta) {
      const newQty = Math.max(1, currentOrder.items[i].quantity + delta);
      currentOrder.items[i].quantity = newQty;
      document.getElementById(`qty-val-${i}`).textContent = newQty;
    }

    function changeGram(i, grams, price) {
      currentOrder.items[i].gram_size = grams;
      currentOrder.items[i].unit_price = price;
      document.querySelectorAll(`[id^="gram-btn-${i}-"]`).forEach(btn => {
        const btnG = parseFloat(btn.id.split('-').pop());
        btn.className = `px-2.5 py-1.5 text-xs rounded-lg font-medium transition ${btnG === grams ? 'bg-brand text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`;
      });
    }

    function closeModal() {
      document.getElementById('status-modal').classList.add('hidden');
      currentOrderId = null;
      currentOrder = null;
    }

    async function saveOrderModal() {
      if (!currentOrderId) return;
      await fetch(`/api/orders/${currentOrderId}/items`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          items: currentOrder.items.map(i => ({
            product_id: i.product_id,
            gram_size: i.gram_size,
            quantity: i.quantity,
            unit_price: i.unit_price,
          }))
        }),
      });
      await fetch(`/api/orders/${currentOrderId}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ status: selectedStatus }),
      });
      closeModal();
      load();
    }

    async function deleteOrder() {
      if (!currentOrderId) return;
      if (!confirm('確定要刪除這筆訂單？')) return;
      await fetch(`/api/orders/${currentOrderId}`, { method: 'DELETE' });
      closeModal();
      load();
    }

    document.getElementById('status-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    function toggleSummary() {
      const body = document.getElementById('product-summary-body');
      const chevron = document.getElementById('summary-chevron');
      body.classList.toggle('hidden');
      chevron.style.transform = body.classList.contains('hidden') ? '' : 'rotate(180deg)';
    }

    loadProducts();
    load();
  </script>
</body>
</html>
